<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020810"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f7c59f"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <radialGradient id="globe" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#020810;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>
  <!-- Globe circle -->
  <circle cx="140" cy="160" r="100" fill="url(#globe)" stroke="#1e3a5f" stroke-width="1"/>
  <circle cx="140" cy="160" r="100" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
  <!-- Latitude lines -->
  <ellipse cx="140" cy="130" rx="100" ry="15" fill="none" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
  <ellipse cx="140" cy="160" rx="100" ry="20" fill="none" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
  <ellipse cx="140" cy="190" rx="100" ry="15" fill="none" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
  <line x1="140" y1="60" x2="140" y2="260" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
  <line x1="80" y1="65" x2="200" y2="255" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
  <!-- Alert hotspots -->
  <circle cx="110" cy="140" r="6" fill="#ef4444" opacity="0.9" filter="url(#glow)"/>
  <circle cx="110" cy="140" r="12" fill="#ef4444" opacity="0.2"/>
  <circle cx="175" cy="155" r="5" fill="#f97316" opacity="0.9" filter="url(#glow)"/>
  <circle cx="130" cy="185" r="4" fill="#eab308" opacity="0.9" filter="url(#glow)"/>
  <circle cx="160" cy="125" r="5" fill="#ef4444" opacity="0.8" filter="url(#glow)"/>
  <!-- Main title -->
  <text x="270" y="100" font-family="'Segoe UI',Arial,sans-serif" font-size="42" font-weight="800" fill="url(#titleGrad)" filter="url(#glow)">Real-Time Disaster Prediction</text>
  <text x="270" y="150" font-family="'Segoe UI',Arial,sans-serif" font-size="26" font-weight="300" fill="#7ab8d4" letter-spacing="2">Satellite Data × Deep Learning × Multi-Agent AI</text>
  <!-- Badge row -->
  <rect x="270" y="172" width="105" height="26" rx="13" fill="#0d2a44" stroke="#ef4444" stroke-width="1"/>
  <text x="322" y="189" font-family="Arial" font-size="11" fill="#ef4444" text-anchor="middle">🌊 Flood AUC 0.943</text>
  <rect x="385" y="172" width="110" height="26" rx="13" fill="#0d2a44" stroke="#f97316" stroke-width="1"/>
  <text x="440" y="189" font-family="Arial" font-size="11" fill="#f97316" text-anchor="middle">🔥 Fire AUC 0.921</text>
  <rect x="505" y="172" width="110" height="26" rx="13" fill="#0d2a44" stroke="#8b5cf6" stroke-width="1"/>
  <text x="560" y="189" font-family="Arial" font-size="11" fill="#8b5cf6" text-anchor="middle">🌀 Compound F1 0.89</text>
  <rect x="625" y="172" width="110" height="26" rx="13" fill="#0d2a44" stroke="#22c55e" stroke-width="1"/>
  <text x="680" y="189" font-family="Arial" font-size="11" fill="#22c55e" text-anchor="middle">🤖 5 AI Agents 24/7</text>
  <rect x="745" y="172" width="120" height="26" rx="13" fill="#0d2a44" stroke="#00d4ff" stroke-width="1"/>
  <text x="805" y="189" font-family="Arial" font-size="11" fill="#00d4ff" text-anchor="middle">⚡ 18.4h Lead Time</text>
  <!-- Model tags row -->
  <text x="270" y="230" font-family="Arial" font-size="12" fill="#4a6080">Models: </text>
  <text x="325" y="230" font-family="Arial" font-size="12" fill="#6080a0">ConvLSTM • Swin Transformer • Temporal Fusion Transformer • Cross-Hazard Attention • Neural Rothermel</text>
  <!-- Stack row -->
  <text x="270" y="255" font-family="Arial" font-size="12" fill="#4a6080">Stack: </text>
  <text x="313" y="255" font-family="Arial" font-size="12" fill="#6080a0">PyTorch 2.1 • FastAPI • Next.js 15 • Docker/K8s • NASA FIRMS • Copernicus • ERA5 • EM-DAT</text>
  <!-- Stars / stats -->
  <text x="270" y="290" font-family="Arial" font-size="11" fill="#3a5070">
    ⭐ NeurIPS/CVPR/KDD Target  •  🌍 124M People Protected  •  📡 13 Real Datasets  •  MIT License
  </text>
  <rect x="1" y="1" width="1198" height="318" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
</svg>
